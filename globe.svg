<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <style>
    .globe { font: bold 12px monospace; fill: #24292e; white-space: pre; }
    .moving-map { animation: scroll 5s linear infinite; }
    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-200px); }
    }
  </style>
  <mask id="sphere">
    <circle cx="200" cy="100" r="80" fill="white" />
  </mask>
  <g mask="url(#sphere)">
    <text x="0" y="20" class="globe moving-map">
      <tspan x="0" dy="1.2em"> .--.      .--.      .--.      .--. </tspan>
      <tspan x="0" dy="1.2em">|    |    |    |    |    |    |    |</tspan>
      <tspan x="0" dy="1.2em"> '..’      '..’      '..’      '..’ </tspan>
      <!-- Add more ASCII rows here to fill the height -->
    </text>
  </g>
</svg>
